<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processing Payment Result...</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background-color: #f5f5f5;
        }
        .loading {
            font-size: 18px;
            color: #666;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 2s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="spinner"></div>
    <div class="loading">Processing payment result. Please wait...</div>
    
    <script>
        // Read URL parameters.
        function getUrlParams() {
            const params = {};
            const urlSearchParams = new URLSearchParams(window.location.search);
            for (const [key, value] of urlSearchParams) {
                params[key] = value;
            }
            return params;
        }
        
        // Handle payment callback.
        function handlePaymentCallback() {
            const params = getUrlParams();
            console.log('Payment callback params:', params);
            
            const orderSn = params.orderSn;
            const paymentChannel = params.paymentChannel;
            const success = params.success;
            
            if (orderSn && paymentChannel) {
                localStorage.setItem('h5PaymentOrderSn', orderSn);
                localStorage.setItem('h5PaymentChannel', paymentChannel);
                localStorage.setItem('h5PaymentCallbackParams', JSON.stringify(params));
                
                let targetUrl;
                if (success === 'true' || success === true) {
                    targetUrl = `${window.location.origin}/#/pages/money/paySuccess?orderSn=${orderSn}&paymentChannel=${paymentChannel}&success=${success}`;
                    console.log('Payment succeeded. Redirecting:', targetUrl);
                } else {
                    targetUrl = `${window.location.origin}/#/pages/index/index?paymentResult=failed&orderSn=${orderSn}`;
                    console.log('Payment failed or was canceled. Redirecting:', targetUrl);
                }
                
                window.location.href = targetUrl;
            } else {
                console.log('Payment callback params are incomplete:', params);
                window.location.href = `${window.location.origin}/#/pages/index/index?error=callback_params_missing`;
            }
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(handlePaymentCallback, 500);
        });
    </script>
</body>
</html>
